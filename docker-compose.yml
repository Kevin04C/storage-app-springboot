version: '3.8'

services:
  app:
    build: .
    container_name: stonestorage_app
    restart: unless-stopped
    ports:
      - "8082:8080"
    env_file: .env
    environment:
      - TZ=America/Lima
    volumes:
      - /opt/storage:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
